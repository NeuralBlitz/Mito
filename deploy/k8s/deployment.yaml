apiVersion: apps/v1
kind: Deployment
metadata:
  name: mito-api
  labels:
    app: mito
    component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mito
      component: api
  template:
    metadata:
      labels:
        app: mito
        component: api
    spec:
      containers:
      - name: mito-api
        image: mito:latest
        ports:
        - containerPort: 8000
        env:
        - name: MITO_HOME
          value: /app
        - name: PYTHONUNBUFFERED
          value: "1"
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "8Gi"
            cpu: "4000m"
        volumeMounts:
        - name: models
          mountPath: /app/models
        - name: data
          mountPath: /app/data
      volumes:
      - name: models
        persistentVolumeClaim:
          claimName: mito-models
      - name: data
        persistentVolumeClaim:
          claimName: mito-data
---
apiVersion: v1
kind: Service
metadata:
  name: mito-api
spec:
  selector:
    app: mito
    component: api
  ports:
  - port: 80
    targetPort: 8000
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mito-models
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 50Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mito-data
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Gi
