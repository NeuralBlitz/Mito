<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mito AI Toolkit</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #1e3a5f 0%, #0f172a 100%); }
        .card { backdrop-filter: blur(10px); background: rgba(255,255,255,0.05); }
        .typing { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body class="gradient-bg min-h-screen text-white">
    <div id="app" class="container mx-auto px-4 py-8 max-w-6xl">
        <header class="text-center mb-12">
            <h1 class="text-5xl font-bold mb-2 bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-blue-500">
                Mito
            </h1>
            <p class="text-gray-400 text-lg">The Powerhouse AI Toolkit</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div class="card rounded-xl p-6 border border-gray-700">
                <h2 class="text-xl font-semibold mb-4 flex items-center">
                    <span class="w-2 h-2 bg-green-400 rounded-full mr-2"></span>
                    Chat
                </h2>
                <div class="bg-gray-900/50 rounded-lg p-4 h-64 overflow-y-auto mb-4" id="chat-box">
                    <div v-for="msg in messages" :key="msg.id" class="mb-3">
                        <div :class="msg.role === 'user' ? 'text-right' : 'text-left'">
                            <span :class="msg.role === 'user' ? 'bg-blue-600' : 'bg-gray-700'" 
                                  class="inline-block px-4 py-2 rounded-lg max-w-[80%]">
                                {{ msg.content }}
                            </span>
                        </div>
                    </div>
                    <div v-if="loading" class="typing text-gray-400">Thinking...</div>
                </div>
                <div class="flex gap-2">
                    <input v-model="userInput" @keyup.enter="sendMessage" 
                           placeholder="Type your message..." 
                           class="flex-1 bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:border-blue-500">
                    <button @click="sendMessage" :disabled="loading"
                            class="bg-blue-600 hover:bg-blue-700 px-6 py-2 rounded-lg disabled:opacity-50">
                        Send
                    </button>
                </div>
            </div>

            <div class="space-y-6">
                <div class="card rounded-xl p-6 border border-gray-700">
                    <h2 class="text-xl font-semibold mb-4">Quick Tools</h2>
                    <div class="grid grid-cols-2 gap-3">
                        <button @click="quickTool('sentiment')" 
                                class="bg-gray-800 hover:bg-gray-700 p-4 rounded-lg text-left transition">
                            <div class="text-2xl mb-1">💭</div>
                            <div class="font-medium">Sentiment</div>
                        </button>
                        <button @click="quickTool('summarize')" 
                                class="bg-gray-800 hover:bg-gray-700 p-4 rounded-lg text-left transition">
                            <div class="text-2xl mb-1">📝</div>
                            <div class="font-medium">Summarize</div>
                        </button>
                        <button @click="quickTool('translate')" 
                                class="bg-gray-800 hover:bg-gray-700 p-4 rounded-lg text-left transition">
                            <div class="text-2xl mb-1">🌐</div>
                            <div class="font-medium">Translate</div>
                        </button>
                        <button @click="quickTool('embed')" 
                                class="bg-gray-800 hover:bg-gray-700 p-4 rounded-lg text-left transition">
                            <div class="text-2xl mb-1">🔢</div>
                            <div class="font-medium">Embed</div>
                        </button>
                    </div>
                </div>

                <div class="card rounded-xl p-6 border border-gray-700">
                    <h2 class="text-xl font-semibold mb-4">Upload File</h2>
                    <div class="border-2 border-dashed border-gray-700 rounded-lg p-8 text-center hover:border-blue-500 transition cursor-pointer"
                         @click="$refs.fileInput.click()">
                        <input type="file" ref="fileInput" @change="handleFileUpload" class="hidden">
                        <div class="text-4xl mb-2">📁</div>
                        <div>Click to upload or drag and drop</div>
                        <div class="text-sm text-gray-500 mt-2">OCR, Classification, Detection</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card rounded-xl p-6 border border-gray-700">
            <h2 class="text-xl font-semibold mb-4">API Reference</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="bg-gray-900/50 rounded-lg p-4">
                    <code class="text-green-400">POST /generate</code>
                    <p class="text-sm text-gray-400 mt-2">Text generation</p>
                </div>
                <div class="bg-gray-900/50 rounded-lg p-4">
                    <code class="text-green-400">POST /sentiment</code>
                    <p class="text-sm text-gray-400 mt-2">Sentiment analysis</p>
                </div>
                <div class="bg-gray-900/50 rounded-lg p-4">
                    <code class="text-green-400">POST /embed</code>
                    <p class="text-sm text-gray-400 mt-2">Text embeddings</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref } = Vue;
        
        createApp({
            setup() {
                const userInput = ref('');
                const messages = ref([
                    { id: 1, role: 'assistant', content: 'Hello! I\'m Mito, your AI assistant. How can I help you today?' }
                ]);
                const loading = ref(false);
                const apiUrl = window.location.origin + '/api';
                
                const sendMessage = async () => {
                    if (!userInput.value.trim() || loading.value) return;
                    
                    const input = userInput.value;
                    messages.value.push({ id: Date.now(), role: 'user', content: input });
                    userInput.value = '';
                    loading.value = true;
                    
                    try {
                        const response = await axios.post(apiUrl + '/generate', {
                            prompt: input,
                            max_tokens: 200
                        });
                        messages.value.push({ 
                            id: Date.now(), 
                            role: 'assistant', 
                            content: response.data.text 
                        });
                    } catch (e) {
                        messages.value.push({ 
                            id: Date.now(), 
                            role: 'assistant', 
                            content: 'Sorry, something went wrong.' 
                        });
                    }
                    loading.value = false;
                };
                
                const quickTool = async (tool) => {
                    const input = prompt('Enter text for ' + tool + ':');
                    if (!input) return;
                    
                    loading.value = true;
                    try {
                        const response = await axios.post(apiUrl + '/' + tool, { text: input });
                        alert('Result: ' + JSON.stringify(response.data, null, 2));
                    } catch (e) {
                        alert('Error: ' + e.message);
                    }
                    loading.value = false;
                };
                
                const handleFileUpload = async (e) => {
                    const file = e.target.files[0];
                    if (!file) return;
                    
                    loading.value = true;
                    const formData = new FormData();
                    formData.append('file', file);
                    
                    try {
                        const response = await axios.post(apiUrl + '/ocr', formData);
                        alert('Extracted text: ' + response.data.text.join('\n'));
                    } catch (e) {
                        alert('Error: ' + e.message);
                    }
                    loading.value = false;
                };
                
                return { userInput, messages, loading, sendMessage, quickTool, handleFileUpload };
            }
        }).mount('#app');
    </script>
</body>
</html>
